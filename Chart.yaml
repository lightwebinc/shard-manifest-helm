apiVersion: v2
name: shard-manifest
description: BRC-139 Shard Manifest Announcement Daemon for the BSV multicast pipeline
type: application
version: 0.2.2
# appVersion MUST equal a tag published on ghcr.io/lightwebinc/shard-manifest
# (the chart's tag:"" default pulls this). Images are published manually via the
# binary repo's image-publish.yml workflow; bump appVersion ONLY in lockstep with
# an image publish — binary git tags are NOT image tags until published.
appVersion: "0.2.2"
kubeVersion: ">= 1.27.0-0"
keywords:
  - bitcoin
  - bsv
  - multicast
  - brc-139
  - shard-manifest
home: https://github.com/lightwebinc/shard-manifest
sources:
  - https://github.com/lightwebinc/shard-manifest
  - https://github.com/lightwebinc/shard-manifest-helm
maintainers:
  - name: lightwebinc
    url: https://github.com/lightwebinc
icon: https://raw.githubusercontent.com/lightwebinc/bsv-multicast/main/.assets/icon.png
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - kind: added
      description: Initial chart scaffold
